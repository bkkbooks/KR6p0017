front:
  text: 佛説阿彌陀經略解序吳郡沙門大佑述夫寂光真淨初無苦樂之殊妄識紛紜遂有聖凡之異由是漂流五濁莫遍一真故我釋尊示生堪忍當祗園之嘉會告身子之利根開法藏之願門指樂之妙土瓊林玉沼直顯於心源壽量光明全彰於自性衆聖同處非少善之得生七日持名在一心之不亂車理體一生佛原同無緣之慈不謀而應了唯心之本具億剎非遙知大願之可憑三祗橫截經文簡約佛旨玄微持誦雖多研詳實寡惟前賢之著述嗟末俗之罕聞竊效流通略伸援引願與同志普結淨緣咸契無生同登不退云爾唐慈恩法師造彌陀通贊一卷宋孤山淨覺靈芝諸師皆有疏記三衢倫師古崖新師皆曾集注今欲從略以便初機故茲別出各從其志
